services:

  postgres:
    image: postgres:16

    container_name: prahari_postgres

    restart: always

    env_file:
      - ./backend/.env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:

    build:
      context: ./backend

    container_name: prahari_backend

    restart: always

    env_file:
      - ./backend/.env

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/prahari

    volumes:
      - ./backend:/app

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

volumes:

  postgres_data: